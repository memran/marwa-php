services:
  caddy:
    image: caddy:2-alpine
    container_name: marwa-caddy-fpm
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ../:/var/www/html
      - ./caddy/Caddyfile.fpm:/etc/caddy/Caddyfile:ro
      # - ./caddy/data:/data
      # - ./caddy/config:/config
    working_dir: /var/www/html
    depends_on:
      - php-fpm

  php-fpm:
    build:
      context: .
      dockerfile: php-fpm/Dockerfile
    container_name: marwa-php-fpm
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - ./docker.env
    volumes:
      - ../:/var/www/html
      - ./docker.env:/var/www/html/.env:ro
    expose:
      - "9000"
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11.4
    container_name: marwa-mariadb
    restart: unless-stopped
    env_file:
      - ./docker.env
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'mariadb-admin ping -h 127.0.0.1 -u \"$$MARIADB_USER\" -p\"$$MARIADB_PASSWORD\" --silent'"]
      interval: 5s
      timeout: 5s
      retries: 10

  assets:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - ../:/workspace
    command: sh -c "npm ci --no-audit --no-fund && npm run dev"
    profiles:
      - assets

volumes:
  mariadb-data:
