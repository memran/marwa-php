services:
  php:
    build: ./php-fpm
    volumes:
      - ../:/var/www/html
      - ./php-fpm/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    command: >
      sh -c "
        chown -R www-data:www-data /var/www/html/storage &&
        chmod -R 775 /var/www/html/storage &&
        php-fpm
      "
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - appnet

  assets:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - ../:/workspace
    command: sh -c "npm ci --no-audit --no-fund && npm run dev"
    profiles:
      - assets
    networks:
      - appnet

networks:
  appnet:
