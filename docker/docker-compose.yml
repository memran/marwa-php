services:
  php:
    build: ./php-fpm
    env_file:
      - ./docker.env
    volumes:
      - ../:/var/www/html
      - ./docker.env:/var/www/html/.env:ro
      - ./php-fpm/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    command: >
      sh -c "
        chown -R www-data:www-data /var/www/html/storage &&
        chmod -R 775 /var/www/html/storage &&
        php-fpm
      "
    networks:
      - appnet
    depends_on:
      mariadb:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - appnet

  mariadb:
    image: mariadb:11.4
    env_file:
      - ./docker.env
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'mariadb-admin ping -h 127.0.0.1 -u \"$$MARIADB_USER\" -p\"$$MARIADB_PASSWORD\" --silent'"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  assets:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - ../:/workspace
    command: sh -c "npm ci --no-audit --no-fund && npm run dev"
    profiles:
      - assets
    networks:
      - appnet

networks:
  appnet:

volumes:
  mariadb-data:
