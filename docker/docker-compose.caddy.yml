name: marwa-caddy

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ../:/var/www/html
      - ./caddy/Caddyfile.fpm:/etc/caddy/Caddyfile:ro
      # - ./caddy/data:/data
      # - ./caddy/config:/config
    working_dir: /var/www/html
    depends_on:
      - php-fpm

  php-fpm:
    build:
      context: .
      dockerfile: php-fpm/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - ./docker.caddy.env
    volumes:
      - ../:/var/www/html
      - ./docker.caddy.env:/var/www/html/.env:ro
      - ./php-fpm/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    expose:
      - "9000"
    # Entrypoint handles: migrations, queue worker, scheduler, and php-fpm
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    env_file:
      - ./docker.caddy.env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-super-secret}
      MARIADB_DATABASE: ${DB_NAME:-marwa}
      MARIADB_USER: ${DB_USER:-marwa}
      MARIADB_PASSWORD: ${DB_PASSWORD:-super-secret}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'mariadb-admin ping -h 127.0.0.1 -u \"$$MARIADB_USER\" -p\"$$MARIADB_PASSWORD\" --silent'"]
      interval: 5s
      timeout: 5s
      retries: 10

  assets:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - ../:/workspace
    command: sh -c "npm ci --no-audit --no-fund && npm run build"
    profiles:
      - assets

volumes:
  mariadb-data:
